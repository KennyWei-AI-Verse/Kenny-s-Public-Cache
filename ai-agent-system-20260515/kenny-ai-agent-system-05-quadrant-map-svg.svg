anchor="start" font-family="Noto Sans CJK SC, Arial">牛｜Codex</text><rect x="1666" y="638" width="150" height="42" rx="21" fill="#3B82F6"/><text x="1741" y="667" fill="#fff" font-size="19" font-weight="700" text-anchor="middle" font-family="Noto Sans CJK SC, Arial">关键代码</text><text x="1308" y="712" fill="#3B82F6" font-size="22" font-weight="700" text-anchor="start" font-family="Noto Sans CJK SC, Arial">定位：Gpt 5.5 代码专家</text><text x="1308" y="748" fill="#172033" font-size="20" font-weight="700" text-anchor="start" font-family="Noto Sans CJK SC, Arial">职责：</text><text x="1338" y="780" fill="#475569" font-size="19" font-weight="400" text-anchor="start" font-family="Noto Sans CJK SC, Arial">关键代码修改、架构变更、复杂 bug 修复</text><text x="1338" y="809" fill="#475569" font-size="19" font-weight="400" text-anchor="start" font-family="Noto Sans CJK SC, Arial">代码审计、最小 diff 修复</text><text x="1308" y="846" fill="#475569" font-size="18" font-weight="400" text-anchor="start" font-family="Noto Sans CJK SC, Arial">关系：只处理高价值代码任务，由猫写精确 Prompt 后</text><text x="1308" y="872" fill="#475569" font-size="18" font-weight="400" text-anchor="start" font-family="Noto Sans CJK SC, Arial">派单</text><rect x="765" y="445" width="390" height="120" rx="28" fill="#fff" stroke="#F59E0B" stroke-width="3"/><text x="835" y="518" fill="#F59E0B" font-size="58" font-weight="700" text-anchor="middle" font-family="Noto Sans CJK SC, Arial">K</text><text x="895" y="493" fill="#172033" font-size="34" font-weight="700" text-anchor="start" font-family="Noto Sans CJK SC, Arial">Kenny</text><text x="895" y="531" fill="#475569" font-size="22" font-weight="400" text-anchor="start" font-family="Noto Sans CJK SC, Arial">最终决策者 / 任务发起人</text><line x1="960" y1="445" x2="960" y2="380" stroke="#F59E0B" stroke-width="5"/><polygon points="960,380 969.4083701207519,395.3454413970711 950.5916298792481,395.3454413970711" fill="#F59E0B"/><text x="960.0" y="400.5" fill="#F59E0B" font-size="22" font-weight="700" text-anchor="middle" font-family
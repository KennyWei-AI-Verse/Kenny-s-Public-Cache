xt x="738" y="750" fill="#CBD5E1" font-size="19" font-weight="400" text-anchor="start" font-family="Noto Sans CJK SC, Arial">通用任务、QA、排障、代码审阅</text><text x="738" y="779" fill="#CBD5E1" font-size="19" font-weight="400" text-anchor="start" font-family="Noto Sans CJK SC, Arial">文件操作、Google / GitHub 工作空间、复杂推理</text><text x="708" y="816" fill="#CBD5E1" font-size="18" font-weight="400" text-anchor="start" font-family="Noto Sans CJK SC, Arial">关系：常规执行默认优先；不负责生图，生图转给虾</text><rect x="1280" y="590" width="560" height="290" rx="24" fill="#14233B" stroke="#3B82F6" stroke-width="3"/><text x="1308" y="638" fill="#F8FAFC" font-size="42" font-weight="700" text-anchor="start" font-family="Noto Sans CJK SC, Arial">🐂</text><text x="1368" y="638" fill="#F8FAFC" font-size="29" font-weight="700" text-anchor="start" font-family="Noto Sans CJK SC, Arial">牛｜Codex</text><rect x="1666" y="608" width="150" height="42" rx="21" fill="#3B82F6"/><text x="1741" y="637" fill="#fff" font-size="19" font-weight="700" text-anchor="middle" font-family="Noto Sans CJK SC, Arial">关键代码</text><text x="1308" y="682" fill="#3B82F6" font-size="22" font-weight="700" text-anchor="start" font-family="Noto Sans CJK SC, Arial">定位：Gpt 5.5 代码专家</text><text x="1308" y="718" fill="#F8FAFC" font-size="20" font-weight="700" text-anchor="start" font-family="Noto Sans CJK SC, Arial">职责：</text><text x="1338" y="750" fill="#CBD5E1" font-size="19" font-weight="400" text-anchor="start" font-family="Noto Sans CJK SC, Arial">关键代码修改、架构变更、复杂 bug 修复</text><text x="1338" y="779" fill="#CBD5E1" font-size="19" font-weight="400" text-anchor="start" font-family="Noto Sans CJK SC, Arial">代码审计、最小 diff 修复</text><text x="1308" y="816" fill="#CBD5E1" font-size="18" font-weight="400" text-anchor="start" font-family="Noto Sans CJK SC, Arial">关系：只处理高价值代码任务，由猫写精确 Prompt 后</text><text x="1308" y="842" fill="#CBD5E1" font-size="18" font-weight="400" text-anchor="start" font-family="Noto Sans CJK SC, Arial">派单</text><line x1="510" y1="215" x2="620" y2
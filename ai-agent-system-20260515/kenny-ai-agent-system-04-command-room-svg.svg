</text><text x="250" y="198" fill="#fff" font-size="34" font-weight="700" text-anchor="start" font-family="Noto Sans CJK SC, Arial">Kenny</text><text x="250" y="236" fill="#E2E8F0" font-size="22" font-weight="400" text-anchor="start" font-family="Noto Sans CJK SC, Arial">最终决策者 / 任务发起人</text><rect x="620" y="145" width="700" height="245" rx="24" fill="#14233B" stroke="#8B5CF6" stroke-width="3"/><text x="648" y="193" fill="#F8FAFC" font-size="42" font-weight="700" text-anchor="start" font-family="Noto Sans CJK SC, Arial">🐱</text><text x="708" y="193" fill="#F8FAFC" font-size="29" font-weight="700" text-anchor="start" font-family="Noto Sans CJK SC, Arial">猫｜Notion AI</text><rect x="1146" y="163" width="150" height="42" rx="21" fill="#8B5CF6"/><text x="1221" y="192" fill="#fff" font-size="19" font-weight="700" text-anchor="middle" font-family="Noto Sans CJK SC, Arial">主参谋和调度中枢</text><text x="648" y="237" fill="#8B5CF6" font-size="22" font-weight="700" text-anchor="start" font-family="Noto Sans CJK SC, Arial">定位：无限上下文中枢</text><text x="648" y="273" fill="#F8FAFC" font-size="20" font-weight="700" text-anchor="start" font-family="Noto Sans CJK SC, Arial">职责：</text><text x="678" y="305" fill="#CBD5E1" font-size="19" font-weight="400" text-anchor="start" font-family="Noto Sans CJK SC, Arial">思考、讨论、任务拆解、派单、记录</text><text x="678" y="334" fill="#CBD5E1" font-size="19" font-weight="400" text-anchor="start" font-family="Noto Sans CJK SC, Arial">Notion 操作、长期记忆维护</text><rect x="560" y="430" width="800" height="90" rx="30" fill="#142B4A" stroke="#60A5FA" stroke-width="3"/><text x="960" y="486" fill="#DDF4FF" font-size="34" font-weight="700" text-anchor="middle" font-family="Noto Sans CJK SC, Arial">作战指挥室：需求拆解、派单、执行、回报、复盘</text><rect x="80" y="590" width="560" height="290" rx="24" fill="#14233B" stroke="#F97316" stroke-width="3"/><text x="108" y="638" fill="#F8FAFC" font-size="42" font-weight="700" text-anchor="start" font-family="Noto Sans CJK SC, Arial">🦞</text><text x="168" y="638"